name: Token CI

on:
  pull_request:
    paths:
      - "token-definitions/**"
      - "blocks/**"
      - "projects.config.json"
      - "targets.config.json"
      - "scripts/**"
      - ".github/workflows/token-ci.yml"
  workflow_dispatch:

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:tokens
      - run: npm run check:stale-token-pr
      - run: npm run build:artifacts
      - name: Upload token artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-dist
          path: dist/
